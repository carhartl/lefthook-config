---
commit-msg:
  commands:
    commitlint:
      run: npx --yes commitlint@20.4.3 --extends @well-crafted/commitlint-config --edit
pre-commit:
  parallel: true
  commands:
    actionlint:
      tags: lint build
      glob: ".github/workflows/*.yml"
      run: actionlint {staged_files}
    hadolint:
      tags: lint docker
      glob: "Dockerfile*"
      run: hadolint {staged_files} --failure-threshold warning
    prettier:
      tags: style glue
      glob: "*.{json,md,yaml,yml}"
      stage_fixed: true
      run: prettier --write {staged_files}
    shellcheck:
      tags: lint shell
      glob: "*.{bash,sh}"
      run: shellcheck {staged_files}
    shfmt:
      tags: style shell
      glob: "*.{bash,sh}"
      stage_fixed: true
      run: shfmt -w {staged_files}
    yamllint:
      tags: lint yaml
      glob: "*.{yaml,yml}"
      run: |
        if [ -f .yamllint ]; then
          yamllint {staged_files}
        else
          yamllint -d "{extends: default, rules: {line-length: {max: 120}, comments: disable}}" {staged_files}
        fi
pre-push:
  parallel: true
  commands:
    check-leaks:
      tags: security
      run: |
        gitleaks git --log-opts="$(git merge-base origin/main HEAD)..HEAD" --no-banner --redact --verbose
